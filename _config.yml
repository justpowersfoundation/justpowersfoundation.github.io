# Just Powers Foundation Jekyll Configuration
# Preview locally: bundle install && bundle exec jekyll serve
# Push to GitHub: git add . && git commit -m "Fix theme compatibility" && git push

# Site settings
title: "Just Powers Foundation"
description: "Advancing liberty through rigorous research, policy analysis, and public education on the universal principles of just powers as articulated in the Declaration of Independence, with free markets as their natural consequence."
url: "https://justpowersfoundation.github.io"
baseurl: ""

# Theme - Using Cayman theme (GitHub Pages compatible, professional look)
theme: jekyll-theme-cayman

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Collections
collections:
  research:
    output: true
    permalink: "/research/:name/"
  about:
    output: true
  team:
    output: true

# Author
author:
  name: "Just Powers Foundation"
  bio: "Dedicated to promoting the universal principles of just powers from the Declaration of Independence, with free markets as their natural consequence."
  location: "United States"
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://justpowersfoundation.github.io"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/justpowersfdn"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/company/justpowersfoundation"

# Social sharing
twitter:
  username: justpowersfdn

# SEO
social:
  name: Just Powers Foundation
  links:
    - https://twitter.com/justpowersfdn
    - https://linkedin.com/company/justpowersfoundation

# Footer
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/justpowersfdn"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/company/justpowersfoundation"
    - label: "RSS"
      icon: "fas fa-fw fa-rss-square"
      url: "/feed.xml"

# Include/exclude
include:
  - _pages
exclude:
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - README.md

# GitHub Pages
repository: justpowersfoundation/justpowersfoundation.github.io
github_username: justpowersfoundation

# Favicon placeholder - replace with actual favicon.ico in root
# favicon: "/favicon.ico"
